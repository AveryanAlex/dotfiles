host: ""
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: true
  secret-key: "${CLIPROXYAPI_MANAGEMENT_KEY_HASH}"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

auth-dir: "~/.cli-proxy-api"

api-keys:
  # Per-user keys, shaped so CPA Usage Keeper exposes recognizable prefixes/suffixes.
  - "${CLIPROXYAPI_API_KEY_AVERYANOV}"
debug: true
commercial-mode: false
request-log: true
logging-to-file: true
logs-max-total-size-mb: 0
usage-statistics-enabled: true
proxy-url: ""
request-retry: 3

routing:
  strategy: "round-robin"
  session-affinity: true
  session-affinity-ttl: "24h"

ws-auth: true
nonstream-keepalive-interval: 15
